<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashen Perera | Cybersecurity Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        purple: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce', 800: '#6b21a8', 900: '#581c87', }
                    },
                    animation: {
                        blob: "blob 20s infinite alternate",
                        blob2: "blob2 25s infinite alternate",
                        float: "float 6s ease-in-out infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(50px, -70px) scale(1.1)" },
                            "66%": { transform: "translate(-40px, 40px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        },
                        blob2: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "50%": { transform: "translate(-60px, 80px) scale(1.2)" },
                            "100%": { transform: "translate(20px, -40px) scale(0.8)" }
                        },
                        float: {
                            "0%, 100%": { transform: "translateY(0)" },
                            "50%": { transform: "translateY(-12px)" }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* iOS 26 Light Liquid Glass System */
        body {
            background-color: #eaf4fc; /* SOFT LIGHT BLUE BACKGROUND */
            overflow-x: hidden;
            padding-bottom: 80px; /* Space for mobile bottom nav */
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-left: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.05), inset 0 2px 4px rgba(255, 255, 255, 0.6);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(48px);
            -webkit-backdrop-filter: blur(48px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 30px 0 rgba(0, 0, 0, 0.06), inset 0 2px 4px rgba(255, 255, 255, 0.8);
        }

        .glass-dock {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4));
            backdrop-filter: blur(32px) saturate(150%);
            -webkit-backdrop-filter: blur(32px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-top: 1.5px solid rgba(255, 255, 255, 1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .glass-button-primary {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.95), rgba(29, 78, 216, 0.95)); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4), inset 0 1px 2px rgba(255,255,255,0.5);
            color: white;
        }
        .glass-button-primary:hover {
            box-shadow: 0 12px 30px rgba(29, 78, 216, 0.5), inset 0 1px 2px rgba(255,255,255,0.6);
        }

        .glass-button-blue {
            background: rgba(147, 197, 253, 0.75); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2), inset 0 2px 4px rgba(255,255,255,0.8);
            color: #1e3a8a; 
        }
        .glass-button-blue:hover {
            background: rgba(147, 197, 253, 0.95);
            color: #1e40af;
            box-shadow: 0 10px 28px rgba(59, 130, 246, 0.3), inset 0 2px 4px rgba(255,255,255,0.9);
        }

        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        * { -webkit-font-smoothing: antialiased; }
    </style>
</head>
